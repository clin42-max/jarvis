<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JARVIS Orb</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; -webkit-app-region: drag; cursor: grab; }
    .orb {
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,255,0.9) 0%, rgba(0,100,255,0.6) 50%, transparent 70%);
      border: 2px solid rgba(0,255,255,0.6);
      box-shadow: 0 0 30px rgba(0,255,255,0.6), inset 0 0 15px rgba(255,255,255,0.3);
      animation: pulse 2s ease-in-out infinite, rotate 10s linear infinite;
      position: relative;
    }
    .orb::after {
      content: ''; position: absolute; inset: -8px; border-radius: 50%;
      border: 1px solid rgba(0,255,255,0.3); animation: orbit 4s linear infinite;
    }
    .orb.listening { animation: pulse 0.8s ease-in-out infinite, rotate 5s linear infinite; box-shadow: 0 0 50px rgba(0,255,255,1); }
    .orb.processing { background: radial-gradient(circle, rgba(255,0,255,0.9) 0%, rgba(0,100,255,0.6) 50%, transparent 70%); }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    @keyframes rotate { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    @keyframes orbit { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="orb" id="orb"></div>
  <script>
    const orb = document.getElementById('orb');
    orb.addEventListener('dblclick', () => window.jarvis?.window.show());
    if (window.jarvis) {
      window.jarvis.on('event:ai-status', (stats) => {
        orb.classList.toggle('processing', stats.status === 'processing');
      });
    }
  </script>
</body>
</html>
