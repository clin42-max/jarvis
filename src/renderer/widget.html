<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JARVIS Widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; font-family: 'Courier New', monospace; -webkit-app-region: drag; }
    .widget {
      width: 280px; padding: 12px 16px;
      background: rgba(10,14,39,0.85); backdrop-filter: blur(15px);
      border: 1px solid rgba(0,255,255,0.3); border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,255,255,0.15);
    }
    .widget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .widget-title { color: #00ffff; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }
    .widget-time { color: #cce6ff; font-size: 14px; font-weight: bold; }
    .widget-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .stat { font-size: 9px; color: #8899ff; }
    .stat span { color: #00ffff; }
    .widget-status { margin-top: 8px; display: flex; gap: 8px; }
    .badge { font-size: 8px; padding: 2px 6px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .badge.on { background: rgba(0,255,0,0.15); color: #00ff88; border: 1px solid rgba(0,255,0,0.3); }
    .badge.off { background: rgba(255,50,50,0.1); color: #ff6666; border: 1px solid rgba(255,50,50,0.2); }
  </style>
</head>
<body>
  <div class="widget" id="widget">
    <div class="widget-header">
      <span class="widget-title">JARVIS</span>
      <span class="widget-time" id="time">--:--</span>
    </div>
    <div class="widget-stats">
      <div class="stat">CPU: <span id="cpu">0%</span></div>
      <div class="stat">RAM: <span id="ram">0%</span></div>
      <div class="stat">AI: <span id="ai">Idle</span></div>
      <div class="stat">Voice: <span id="voice">Off</span></div>
    </div>
    <div class="widget-status">
      <span class="badge on" id="statusBadge">Online</span>
    </div>
  </div>
  <script>
    function updateTime() {
      document.getElementById('time').textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    }
    setInterval(updateTime, 1000);
    updateTime();

    document.getElementById('widget').addEventListener('dblclick', () => window.jarvis?.window.show());

    if (window.jarvis) {
      window.jarvis.on('event:system-stats', (stats) => {
        document.getElementById('cpu').textContent = stats.cpu.usage + '%';
        document.getElementById('ram').textContent = stats.memory.percent + '%';
      });
      window.jarvis.on('event:ai-status', (stats) => {
        document.getElementById('ai').textContent = stats.status;
      });
    }
  </script>
</body>
</html>
