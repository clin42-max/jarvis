<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0066ff"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="120" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.3"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.2"/>
  <circle cx="128" cy="128" r="60" fill="url(#core)" filter="url(#glow)"/>
  <circle cx="128" cy="128" r="70" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.6"/>
  <text x="128" y="220" text-anchor="middle" fill="#00ffff" font-family="monospace" font-size="18" letter-spacing="6">JARVIS</text>
</svg>
